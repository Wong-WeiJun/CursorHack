services:
  - type: web
    name: fastskeleton-api
    runtime: python
    plan: free  # 👈 Add this line to bypass the payment wall
    rootDir: backend
    buildCommand: "bash render-build.sh"
    startCommand: "uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/v1/utils/health-check/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false  
      - key: SECRET_KEY
        generateValue: true
      - key: FIRST_SUPERUSER
        value: admin@example.com
      - key: FIRST_SUPERUSER_PASSWORD
        sync: false  
      - key: BACKEND_CORS_ORIGINS
        sync: false  
      - key: FRONTEND_HOST
        sync: false  
      - key: SENTRY_DSN
        value: ""
